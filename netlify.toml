[build]
  functions = "netlify/functions"
  publish = "."

[functions]
  node_bundler = "esbuild"

# Allow the front-end to call /api/analyze-website instead of the long
# /.netlify/functions/analyze-website path.
[[redirects]]
  from = "/api/analyze-website"
  to = "/.netlify/functions/analyze-website"
  status = 200

[[redirects]]
  from = "/api/create-upgrade-payment"
  to = "/.netlify/functions/create-upgrade-payment"
  status = 200

[[redirects]]
  from = "/api/create-payment-intent"
  to = "/.netlify/functions/create-payment-intent"
  status = 200

[[redirects]]
  from = "/api/stripe-config"
  to = "/.netlify/functions/stripe-config"
  status = 200

[[redirects]]
  from = "/api/calendar-config"
  to = "/.netlify/functions/calendar-config"
  status = 200

[[redirects]]
  from = "/api/submit-lead"
  to = "/.netlify/functions/submit-lead"
  status = 200
